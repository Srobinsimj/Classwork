<!DOCTYPE html>
<html>
<head>
    <title>CSS Assignment</title>
    <!-- Internal CSS -->
    <style>
        /* Internal CSS for Building 2 */
        .building2 {
            color: green;
        }

        /* External CSS simulated inside same file */
        .paragraph3 {
            color: purple;
            text-decoration: underline;
        }

        .highlight2 {
            color: teal;
        }

        .highlight3 {
            color: brown;
        }

        .building3 {
            color: navy;
        }
    </style>
</head>
<body>

    <!-- Paragraph 1: Inline CSS (bold, italics) -->
    <p style="font-weight:bold; font-style:italic;">
        Paragraph 1: Styled using inline CSS (bold, italics).
    </p>

    <!-- Paragraph 2: Inline CSS (orange, bold) -->
    <p style="color:orange; font-weight:bold;">
        Paragraph 2: Styled using inline CSS (orange, bold).
    </p>

    <!-- Paragraph 3: External CSS (purple, underline) -->
    <p class="paragraph3">
        Paragraph 3: Styled using external CSS (purple, underline).
    </p>

    <!-- Highlight 1: Inline CSS (color) -->
    <h1 style="color:blue;">Highlight 1</h1>

    <!-- Highlight 2: External CSS (color) -->
    <h2 class="highlight2">Highlight 2</h2>

    <!-- Highlight 3: External CSS (color) -->
    <h1 class="highlight3">Highlight 3</h1>

    <!-- Building 1: Inline CSS (color) -->
    <h3 style="color:red;">Building 1</h3>

    <!-- Building 2: Internal CSS (color) -->
    <h3 class="building2">Building 2</h3>

    <!-- Building 3: External CSS (color) -->
    <h3 class="building3">Building 3</h3>

</body>
</html>
